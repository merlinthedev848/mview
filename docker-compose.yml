services:
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: sentinel-go2rtc
    network_mode: host
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  api:
    build:
      context: ./
      dockerfile: api/Dockerfile
    container_name: sentinel-api
    network_mode: host          # Host networking so ONVIF UDP multicast reaches LAN cameras
    security_opt:
      - apparmor=unconfined
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@127.0.0.1:5432/sentinelnvr
      - REDIS_URL=redis://127.0.0.1:6379/0
      - MQTT_BROKER=127.0.0.1
      - RECORDINGS_DIR=/mnt/storage/mview/recordings
      - SEGMENT_SECONDS=60
      - RECORD_SUBSTREAM_DEFAULT=true
      - RECORD_VIDEO_CODEC=copy
      - RECORD_VIDEO_CRF=30
      - RECORD_VIDEO_PRESET=veryfast
    volumes:
      - /mnt/storage/mview/recordings:/mnt/storage/mview/recordings
    depends_on:
      - postgres
      - redis
      - mqtt
    restart: unless-stopped

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: sentinel-detector
    network_mode: host
    security_opt:
      - apparmor=unconfined
    environment:
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=1883
      - STREAM_URL=rtsp://127.0.0.1:8554/camera1
      - CAMERA_ID=default_cam
      - ACCELERATOR=cpu
      - DETECTOR_MODEL=yolov8n.pt
      - FRAME_STRIDE=6
      - IMAGE_SIZE=640
      - MIN_CONFIDENCE=0.5
      - EVENT_COOLDOWN_SECONDS=5
      - DETECT_CLASSES=0,2,3,5,7
    depends_on:
      - mqtt
      - go2rtc
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel-postgres
    security_opt:
      - apparmor=unconfined
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinelnvr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    security_opt:
      - apparmor=unconfined
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: sentinel-mqtt
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
