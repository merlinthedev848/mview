version: '3.8'

services:
  go2rtc:
    build:
      context: ./vendor/go2rtc
      dockerfile: docker/Dockerfile
    container_name: sentinel-go2rtc
    network_mode: host       # Host network is best for RTSP/WebRTC discovery and performance
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  api:
    build: 
      context: ./api
    container_name: sentinel-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinelnvr
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER=mqtt
    volumes:
      - ./:/app
      - ./sentinel.yml:/app/sentinel.yml
    depends_on:
      - postgres
      - redis
      - mqtt
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel-postgres
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinelnvr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: sentinel-mqtt
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
