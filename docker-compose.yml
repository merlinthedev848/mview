services:
  go2rtc:
    build:
      context: ./vendor/go2rtc
      dockerfile: docker/Dockerfile
    container_name: sentinel-go2rtc
    network_mode: host
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  api:
    build:
      context: ./
      dockerfile: api/Dockerfile
    container_name: sentinel-api
    network_mode: host          # Host networking so ONVIF UDP multicast reaches LAN cameras
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@127.0.0.1:5432/sentinelnvr
      - REDIS_URL=redis://127.0.0.1:6379/0
      - MQTT_BROKER=127.0.0.1
      - RECORDINGS_DIR=/mnt/storage/mview/recordings
      - SEGMENT_MINUTES=60
    volumes:
      - /mnt/storage/mview/recordings:/mnt/storage/mview/recordings
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel-postgres
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinelnvr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: sentinel-mqtt
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
